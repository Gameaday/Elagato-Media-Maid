<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Fix – MediaMaid</title>
  <link rel="stylesheet" href="mediamaid.css">
</head>
<body>
  <div class="sdpi-wrapper">

    <div class="sdpi-item">
      <label class="sdpi-item-label" for="folderPath">Target Folder</label>
      <input type="text" id="folderPath" placeholder="/path/to/your/downloads">
      <div id="pathStatus"></div>
    </div>

    <div class="sdpi-item">
      <label class="sdpi-item-label">Minimum Confidence</label>
      <input type="range" id="minConfidence" min="0" max="100" value="40" step="5">
      <div class="range-value" id="confLabel">40%</div>
      <div class="sdpi-info">Only apply changes if the detected type confidence meets this threshold.</div>
    </div>

    <div class="sdpi-item">
      <label class="sdpi-item-check">
        <input type="checkbox" id="createFolderStructure">
        Create folder structure
      </label>
    </div>

    <hr class="sdpi-divider">

    <div class="sdpi-info">
      <strong>Short press</strong> – auto-detect and rename<br>
      <strong>Long press (&gt;0.5 s)</strong> – dry run (preview in log)<br>
      <strong>Dial rotate</strong> – adjust confidence threshold
    </div>

  </div>

  <script>
    const folderPathEl = document.getElementById("folderPath");
    const minConfEl    = document.getElementById("minConfidence");
    const confLabelEl  = document.getElementById("confLabel");
    const createFSEl   = document.getElementById("createFolderStructure");
    const pathStatusEl = document.getElementById("pathStatus");

    minConfEl.addEventListener("input", () => {
      confLabelEl.textContent = minConfEl.value + "%";
    });

    function validatePath() {
      const path = folderPathEl.value.trim();
      if (!path) {
        pathStatusEl.className = "";
        pathStatusEl.textContent = "";
      } else if (!path.startsWith("/") && !path.match(/^[A-Za-z]:\\/)) {
        pathStatusEl.className = "sdpi-warning";
        pathStatusEl.textContent = "Path should be absolute.";
      } else {
        pathStatusEl.className = "sdpi-success";
        pathStatusEl.textContent = "Ready.";
      }
    }

    function loadSettings(s) {
      if (s.folderPath !== undefined) folderPathEl.value = s.folderPath;
      if (s.minConfidence !== undefined) {
        minConfEl.value = Math.round(s.minConfidence * 100);
        confLabelEl.textContent = minConfEl.value + "%";
      }
      if (s.createFolderStructure !== undefined) createFSEl.checked = s.createFolderStructure;
      validatePath();
    }

    function saveSettings() {
      window.sendToPlugin && window.sendToPlugin({
        event: "setSettings",
        payload: {
          folderPath:            folderPathEl.value.trim(),
          minConfidence:         parseInt(minConfEl.value, 10) / 100,
          createFolderStructure: createFSEl.checked
        }
      });
    }

    function connectElgatoStreamDeckSocket(inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo) {
      const websocket = new WebSocket("ws://127.0.0.1:" + inPort);
      const actionInfo = JSON.parse(inActionInfo);
      loadSettings(actionInfo.payload?.settings ?? {});

      websocket.onopen = () => {
        websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inPropertyInspectorUUID }));
      };
      websocket.onmessage = (evt) => {
        const msg = JSON.parse(evt.data);
        if (msg.event === "didReceiveSettings") loadSettings(msg.payload.settings ?? {});
      };
      window.sendToPlugin = (payload) => {
        websocket.send(JSON.stringify({ event: "setSettings", context: inPropertyInspectorUUID, payload: payload.payload }));
      };

      folderPathEl.addEventListener("input", () => { validatePath(); saveSettings(); });
      minConfEl.addEventListener("change", saveSettings);
      createFSEl.addEventListener("change", saveSettings);
    }
  </script>
</body>
</html>
