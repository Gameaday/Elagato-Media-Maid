<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Stats – MediaMaid</title>
  <link rel="stylesheet" href="mediamaid.css">
</head>
<body>
  <div class="sdpi-wrapper">

    <div class="sdpi-item">
      <label class="sdpi-item-label" for="libraryRoot">Library Root</label>
      <input type="text" id="libraryRoot" placeholder="/path/to/media/library">
      <div id="pathStatus"></div>
    </div>

    <div class="sdpi-item">
      <label class="sdpi-item-label" for="refreshInterval">Auto-refresh (seconds)</label>
      <input type="number" id="refreshInterval" min="0" max="3600" step="30" placeholder="0">
      <div class="sdpi-info">Set to 0 for manual refresh only. Minimum 30 s when enabled.</div>
    </div>

    <hr class="sdpi-divider">

    <div class="sdpi-info sdpi-controls-hint">
      <strong>▶ Press</strong> refresh stats<br>
      <strong>↻ Dial</strong> cycle stats &nbsp;·&nbsp; <strong>Push</strong> refresh &nbsp;·&nbsp; <strong>Tap</strong> details
    </div>

  </div>

  <script src="sdpi-common.js"></script>
  <script>
    var libraryRootEl     = document.getElementById("libraryRoot");
    var refreshIntervalEl = document.getElementById("refreshInterval");
    var pathStatusEl      = document.getElementById("pathStatus");

    function gatherSettings() {
      return {
        libraryRoot:     libraryRootEl.value.trim(),
        refreshInterval: parseInt(refreshIntervalEl.value) || 0
      };
    }

    function onSettingsLoaded(s) {
      libraryRootEl.value     = s.libraryRoot || "";
      refreshIntervalEl.value = s.refreshInterval || 0;
      validatePath(libraryRootEl, pathStatusEl);
    }

    function onPiConnected() {
      libraryRootEl.addEventListener("input", function () {
        validatePath(libraryRootEl, pathStatusEl);
        saveSettings(gatherSettings());
      });
      refreshIntervalEl.addEventListener("change", function () { saveSettings(gatherSettings()); });
    }
  </script>
</body>
</html>
