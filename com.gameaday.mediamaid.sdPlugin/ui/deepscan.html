<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Scan – MediaMaid</title>
  <link rel="stylesheet" href="mediamaid.css">
</head>
<body>
  <div class="sdpi-wrapper">

    <div class="sdpi-item">
      <label class="sdpi-item-label" for="libraryRoot">Library Root</label>
      <input type="text" id="libraryRoot" placeholder="/path/to/media/library">
      <div id="pathStatus"></div>
    </div>

    <div class="sdpi-item">
      <label class="sdpi-item-check">
        <input type="checkbox" id="autoFix">
        Automatically fix naming issues
      </label>
      <div class="sdpi-info">When enabled, short press will scan and rename files in one step. When disabled, short press only reports issues.</div>
    </div>

    <hr class="sdpi-divider">

    <div class="sdpi-info sdpi-controls-hint">
      <strong>▶ Press</strong> scan + fix &nbsp;·&nbsp; <strong>▶ Hold</strong> scan only<br>
      <strong>↻ Dial</strong> browse issues &nbsp;·&nbsp; <strong>Tap</strong> scan
    </div>

  </div>

  <script src="sdpi-common.js"></script>
  <script>
    var libraryRootEl = document.getElementById("libraryRoot");
    var autoFixEl     = document.getElementById("autoFix");
    var pathStatusEl  = document.getElementById("pathStatus");

    function gatherSettings() {
      return {
        libraryRoot: libraryRootEl.value.trim(),
        autoFix:     autoFixEl.checked
      };
    }

    function onSettingsLoaded(s) {
      libraryRootEl.value = s.libraryRoot || "";
      autoFixEl.checked = s.autoFix || false;
      validatePath(libraryRootEl, pathStatusEl);
    }

    function onPiConnected() {
      libraryRootEl.addEventListener("input", function () {
        validatePath(libraryRootEl, pathStatusEl);
        saveSettings(gatherSettings());
      });
      autoFixEl.addEventListener("change", function () { saveSettings(gatherSettings()); });
    }
  </script>
</body>
</html>
