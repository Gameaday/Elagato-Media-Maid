<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFO Editor – MediaMaid</title>
  <link rel="stylesheet" href="mediamaid.css">
</head>
<body>
  <div class="sdpi-wrapper">

    <h1>NFO Editor <span class="badge premium">PREMIUM</span></h1>

    <div class="sdpi-item">
      <label class="sdpi-item-label" for="targetPath">Target Path</label>
      <input type="text" id="targetPath" placeholder="/path/to/media/file-or-folder">
      <div id="pathStatus"></div>
    </div>

    <div class="sdpi-item">
      <label class="sdpi-item-label" for="nfoType">NFO Type</label>
      <select id="nfoType">
        <option value="">Auto-detect</option>
        <option value="tvshow">TV Show</option>
        <option value="episode">Episode</option>
        <option value="movie">Movie</option>
        <option value="artist">Artist</option>
        <option value="album">Album</option>
      </select>
    </div>

    <div class="sdpi-item">
      <label class="sdpi-item-label" for="licenseKey">License Key</label>
      <input type="text" id="licenseKey" placeholder="Enter license key for premium features">
    </div>

    <hr class="sdpi-divider">

    <div class="sdpi-info sdpi-controls-hint">
      <strong>▶ Press</strong> create/update NFO &nbsp;·&nbsp; <strong>▶ Hold</strong> preview<br>
      <strong>↻ Dial</strong> browse fields &nbsp;·&nbsp; <strong>Push</strong> save &nbsp;·&nbsp; <strong>Tap</strong> edit
    </div>

  </div>

  <script src="sdpi-common.js"></script>
  <script>
    var targetPathEl = document.getElementById("targetPath");
    var nfoTypeEl    = document.getElementById("nfoType");
    var licenseKeyEl = document.getElementById("licenseKey");
    var pathStatusEl = document.getElementById("pathStatus");

    function gatherSettings() {
      return {
        targetPath: targetPathEl.value.trim(),
        nfoType:    nfoTypeEl.value,
        licenseKey: licenseKeyEl.value.trim()
      };
    }

    function onSettingsLoaded(s) {
      targetPathEl.value = s.targetPath || "";
      nfoTypeEl.value    = s.nfoType || "";
      licenseKeyEl.value = s.licenseKey || "";
      validatePath(targetPathEl, pathStatusEl);
    }

    function onPiConnected() {
      targetPathEl.addEventListener("input", function () {
        validatePath(targetPathEl, pathStatusEl);
        saveSettings(gatherSettings());
      });
      nfoTypeEl.addEventListener("change", function () { saveSettings(gatherSettings()); });
      licenseKeyEl.addEventListener("change", function () { saveSettings(gatherSettings()); });
    }
  </script>
</body>
</html>
