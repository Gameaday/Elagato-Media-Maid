<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFO Editor Settings</title>
  <link rel="stylesheet" href="mediamaid.css">
</head>
<body>
  <div class="sdpi-wrapper">

    <h1>NFO Editor <span class="badge premium">PREMIUM</span></h1>

    <div class="sdpi-item">
      <label class="sdpi-item-label" for="targetPath">Target Path</label>
      <input type="text" id="targetPath" placeholder="/path/to/media/file-or-folder">
      <div id="pathStatus"></div>
    </div>

    <div class="sdpi-item">
      <label class="sdpi-item-label" for="nfoType">NFO Type</label>
      <select id="nfoType">
        <option value="">Auto-detect</option>
        <option value="tvshow">TV Show</option>
        <option value="episode">Episode</option>
        <option value="movie">Movie</option>
        <option value="artist">Artist</option>
        <option value="album">Album</option>
      </select>
    </div>

    <div class="sdpi-item">
      <label class="sdpi-item-label" for="licenseKey">License Key</label>
      <input type="text" id="licenseKey" placeholder="Enter license key for premium features">
    </div>

    <hr class="sdpi-divider">

    <div class="sdpi-info">
      Create, edit, and update NFO metadata files for Jellyfin/Kodi.<br>
      <strong>Key:</strong> Short press = create/update · Long press = preview<br>
      <strong>Dial:</strong> Rotate to browse fields · Push to save · Touch to edit
    </div>

  </div>

  <script>
    const targetPathEl  = document.getElementById("targetPath");
    const nfoTypeEl     = document.getElementById("nfoType");
    const licenseKeyEl  = document.getElementById("licenseKey");
    const pathStatusEl  = document.getElementById("pathStatus");

    function validatePath() {
      const path = targetPathEl.value.trim();
      if (!path) { pathStatusEl.className = ""; pathStatusEl.textContent = ""; }
      else if (!path.startsWith("/") && !path.match(/^[A-Za-z]:\\/)) {
        pathStatusEl.className = "sdpi-warning";
        pathStatusEl.textContent = "Path should be absolute.";
      } else {
        pathStatusEl.className = "sdpi-success";
        pathStatusEl.textContent = "Ready.";
      }
    }

    function loadSettings(s) {
      targetPathEl.value = s.targetPath || "";
      nfoTypeEl.value = s.nfoType || "";
      licenseKeyEl.value = s.licenseKey || "";
      validatePath();
    }

    function saveSettings() {
      const payload = {
        targetPath: targetPathEl.value.trim(),
        nfoType: nfoTypeEl.value,
        licenseKey: licenseKeyEl.value.trim()
      };
      $PI.websocket && $PI.websocket.send(JSON.stringify({ event: "setSettings", context: $PI.uuid, payload }));
    }

    const $PI = { websocket: null, uuid: "" };

    function connectElgatoStreamDeckSocket(inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo) {
      $PI.uuid = inPropertyInspectorUUID;
      const actionInfo = JSON.parse(inActionInfo);
      $PI.websocket = new WebSocket("ws://127.0.0.1:" + inPort);

      $PI.websocket.onopen = () => {
        $PI.websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: $PI.uuid }));
        $PI.websocket.send(JSON.stringify({ event: "getSettings", context: $PI.uuid }));
      };
      $PI.websocket.onmessage = (evt) => {
        const msg = JSON.parse(evt.data);
        if (msg.event === "didReceiveSettings") loadSettings(msg.payload.settings);
      };

      loadSettings(actionInfo.payload?.settings ?? {});
      targetPathEl.addEventListener("input", () => { validatePath(); saveSettings(); });
      nfoTypeEl.addEventListener("change", saveSettings);
      licenseKeyEl.addEventListener("change", saveSettings);
    }
  </script>
</body>
</html>
