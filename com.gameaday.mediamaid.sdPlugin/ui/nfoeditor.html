<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NFO Editor Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #2d2d2d; color: #d8d8d8; font-size: 12px; padding: 12px; }
    .sdpi-wrapper { display: flex; flex-direction: column; gap: 12px; }
    .sdpi-item { display: flex; align-items: center; gap: 8px; }
    .sdpi-item label { flex: 0 0 90px; text-align: right; font-size: 11px; color: #9e9e9e; }
    .sdpi-item input[type="text"], .sdpi-item select { flex: 1; background: #3b3b3b; border: 1px solid #4a4a4a; color: #d8d8d8; padding: 6px 8px; border-radius: 3px; font-size: 12px; outline: none; }
    .sdpi-item input:focus, .sdpi-item select:focus { border-color: #0078d4; }
    .sdpi-heading { font-size: 13px; font-weight: 600; color: #e8e8e8; padding-bottom: 4px; border-bottom: 1px solid #4a4a4a; margin-bottom: 4px; }
    .sdpi-info { font-size: 10px; color: #888; padding: 4px 0; text-align: center; }
    .sdpi-badge { display: inline-block; background: #ff9800; color: #000; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="sdpi-wrapper">
    <div class="sdpi-heading">NFO Editor ★ <span class="sdpi-badge">PREMIUM</span></div>

    <div class="sdpi-item">
      <label for="targetPath">Target Path</label>
      <input type="text" id="targetPath" placeholder="/path/to/media/file-or-folder">
    </div>

    <div class="sdpi-item">
      <label for="nfoType">NFO Type</label>
      <select id="nfoType">
        <option value="">Auto-detect</option>
        <option value="tvshow">TV Show</option>
        <option value="episode">Episode</option>
        <option value="movie">Movie</option>
        <option value="artist">Artist</option>
        <option value="album">Album</option>
      </select>
    </div>

    <div class="sdpi-item">
      <label for="licenseKey">License Key</label>
      <input type="text" id="licenseKey" placeholder="Enter license key for premium features">
    </div>

    <div class="sdpi-info">
      Create, edit, and update NFO metadata files for Jellyfin/Kodi.<br>
      <strong>Key:</strong> Short press = create/update · Long press = preview<br>
      <strong>Dial:</strong> Rotate to browse fields · Push to save · Touch to edit
    </div>
  </div>

  <script>
    const $PI = {
      websocket: null,
      uuid: "",
      actionInfo: {},
      init(inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo) {
        this.uuid = inPropertyInspectorUUID;
        this.actionInfo = JSON.parse(inActionInfo);
        this.websocket = new WebSocket("ws://127.0.0.1:" + inPort);
        this.websocket.onopen = () => {
          this.websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: this.uuid }));
          this.websocket.send(JSON.stringify({ event: "getSettings", context: this.uuid }));
        };
        this.websocket.onmessage = (evt) => {
          const msg = JSON.parse(evt.data);
          if (msg.event === "didReceiveSettings") this.loadSettings(msg.payload.settings);
        };

        document.getElementById("targetPath").addEventListener("change", () => this.saveSettings());
        document.getElementById("nfoType").addEventListener("change", () => this.saveSettings());
        document.getElementById("licenseKey").addEventListener("change", () => this.saveSettings());
      },
      loadSettings(settings) {
        document.getElementById("targetPath").value = settings.targetPath || "";
        document.getElementById("nfoType").value = settings.nfoType || "";
        document.getElementById("licenseKey").value = settings.licenseKey || "";
      },
      saveSettings() {
        const payload = {
          targetPath: document.getElementById("targetPath").value,
          nfoType: document.getElementById("nfoType").value,
          licenseKey: document.getElementById("licenseKey").value
        };
        this.websocket.send(JSON.stringify({ event: "setSettings", context: this.uuid, payload }));
      }
    };

    function connectElgatoStreamDeckSocket(inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo) {
      $PI.init(inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo);
    }
  </script>
</body>
</html>
